  <body>
    <script>
      let currFn = () => {
        let sum = 0;
        return function(num = 0) {
            sum = sum + num;
            return sum;
        }
      };
      let sum = currFn();
      console.log(sum(1))
      console.log(sum(2))

      console.log(sum(3))

      console.log(sum(4))
      console.log(sum())

    </script>
