<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        const name = "Hi 1 I am Sujal";
        String.prototype.mySplit = function(delimiter){
            // const str = this.toString(); // converting object to string
            let str = this.toString();
            if(delimiter === undefined){
                return [str];
            }
            delimiter = String(delimiter);
            if(delimiter === ""){
                return [...str];
            }
            let result = [];
            while(true){
                let idx = str.indexOf(delimiter);
                if(idx >= 0){
                    let ele = str.slice(0, idx);
                    result.push(ele);
                    str = str.slice(idx + delimiter.length)
                }else{
                    // delimiter not found
                    result.push(str);
                    break;
                }
            }
            return result;
        }


        const split = function(str, delimiter){
            if(delimiter === undefined) return [str];
            delimiter = String(delimiter)
            if(delimiter === '') {
                return [...str]
            }
            let result = [];
            const startSplit = (s) => {
                let idx = s.indexOf(delimiter);
                if(idx >= 0){
                    let ele = s.slice(0, idx);
                    result.push(ele);
                    startSplit(s.slice(idx + delimiter.length))
                }else{
                    result.push(s);
                }
            }

            startSplit(str);
            return result;
        }

        console.log(split("The quick the fox jumps the lazy the dog", "the"))
        console.log(name.mySplit())
        console.log("The quick the fox jumps the lazy the dog".mySplit('the'))
    </script>
</body>
</html>
