<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function myReduce(callback, init){
            if(this === null || this === undefined){
                throw new TypeError("Reduce being called on null or undefined")
            }
            if(!callback || typeof callback !== 'function'){
                throw new TypeError(`${callback} is not a function`)
            }
            if(this.length < 1){ // empty array
                if(arguments.length < 2){ // only one arg passed; init not present
                    throw new TypeError("Reduce of empty array with no initial value")
                }else if(arguments.length === 2){ // we are sure init is present
                    return init;
                }
            }

            let acc;
            let idx;

            if(arguments.length === 1){
                acc = this[0];
                idx = 1;
            }else{
                acc = init;
                idx = 0;
            }

            for(let i = idx; i < this.length; i++){
                if(Object.prototype.hasOwnProperty.call(this, i)){
                    acc = callback(acc, this[i], i, this);
                }
            }
            return acc;
        }

        Array.prototype.myReduce = myReduce;

        // ===== EXAMPLES =====
        console.log("--- Example 1: Sum of array ---");
        const numbers = [1, 2, 3, 4, 5];
        const sum = numbers.myReduce((acc, num) => acc + num, 0);
        console.log("Sum:", sum); // 15

        console.log("\n--- Example 2: Product of array ---");
        const product = numbers.myReduce((acc, num) => acc * num, 1);
        console.log("Product:", product); // 120

        console.log("\n--- Example 3: Sum without initial value ---");
        const sumNoInit = numbers.myReduce((acc, num) => acc + num);
        console.log("Sum (no init):", sumNoInit); // 15

        console.log("\n--- Example 4: Find max value ---");
        const max = numbers.myReduce((acc, num) => num > acc ? num : acc);
        console.log("Max:", max); // 5

        console.log("\n--- Example 5: Count occurrences ---");
        const fruits = ['apple', 'banana', 'apple', 'orange', 'banana', 'apple'];
        const fruitCount = fruits.myReduce((acc, fruit) => {
            acc[fruit] = (acc[fruit] || 0) + 1;
            return acc;
        }, {});
        console.log("Fruit count:", fruitCount); // {apple: 3, banana: 2, orange: 1}

        console.log("\n--- Example 6: Flatten nested array ---");
        const nested = [[1, 2], [3, 4], [5, 6]];
        const flattened = nested.myReduce((acc, arr) => acc.concat(arr), []);
        console.log("Flattened:", flattened); // [1, 2, 3, 4, 5, 6]

        console.log("\n--- Example 7: String concatenation ---");
        const words = ['Hello', 'from', 'myReduce'];
        const sentence = words.myReduce((acc, word) => acc + ' ' + word);
        console.log("Sentence:", sentence); // Hello from myReduce

        console.log("\n--- Example 8: Transform array to object ---");
        const users = [
            { id: 1, name: 'Alice' },
            { id: 2, name: 'Bob' },
            { id: 3, name: 'Charlie' }
        ];
        const userMap = users.myReduce((acc, user) => {
            acc[user.id] = user.name;
            return acc;
        }, {});
        console.log("User map:", userMap); // {1: 'Alice', 2: 'Bob', 3: 'Charlie'}

        console.log("\n--- Example 9: Sparse array with holes ---");
        const sparseArray = [1, , 3, , 5]; // holes at indices 1 and 3
        console.log("Sparse array length:", sparseArray.length); // 5
        console.log("Sparse array:", sparseArray);
        const sparseSu = sparseArray.myReduce((acc, num) => {
            console.log("Processing:", num);
            return acc + num;
        }, 0);
        console.log("Sum of sparse array (skips holes):", sparseSu); // 9 (1+3+5)

        console.log("\n--- Example 10: Manually created sparse array ---");
        const manualSparse = [];
        manualSparse[0] = 10;
        manualSparse[2] = 20;
        manualSparse[4] = 30;
        console.log("Manual sparse array:", manualSparse);
        const manualSum = manualSparse.myReduce((acc, val, idx) => {
            console.log(`Index ${idx}: ${val}`);
            return acc + val;
        }, 0);
        console.log("Sum (only processes existing elements):", manualSum); // 60

        console.log("\n--- Example 11: Sparse array with initial value ---");
        const sparse2 = [2, , 4, , 6];
        const sparseWithInit = sparse2.myReduce((acc, val) => {
            return acc.concat(val);
        }, []);
        console.log("Collected values:", sparseWithInit); // [2, 4, 6]

        console.log("\n--- Example 12: Counting non-empty elements in sparse array ---");
        const sparse3 = [1, , , 2, , 3, , , 4];
        const count = sparse3.myReduce((acc) => acc + 1, 0);
        console.log("Count of non-empty elements:", count); // 4

    </script>
</body>
</html>
